version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-agent_invest}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-anthropic/claude-sonnet-4-6}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-agent}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-agent_invest}
      - NEWS_API_KEY=${NEWS_API_KEY:-}
      - FRONTEND_URL=http://localhost:3000
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHANNEL_ID=${TELEGRAM_CHANNEL_ID:-}
      - TELEGRAM_COMMUNITY_CHAT_ID=${TELEGRAM_COMMUNITY_CHAT_ID:-}
      - TELEGRAM_PAID_CHAT_ID=${TELEGRAM_PAID_CHAT_ID:-}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME:-}
      - TELEGRAM_WEBHOOK_SECRET_TOKEN=${TELEGRAM_WEBHOOK_SECRET_TOKEN:-}
      - TELEGRAM_ADMIN_TOKEN=${TELEGRAM_ADMIN_TOKEN:-}
      - TELEGRAM_DAILY_REPORT_ENABLED=${TELEGRAM_DAILY_REPORT_ENABLED:-false}
      - TELEGRAM_COMMUNITY_REPORT_ENABLED=${TELEGRAM_COMMUNITY_REPORT_ENABLED:-false}
      - TELEGRAM_PAID_REPORT_ENABLED=${TELEGRAM_PAID_REPORT_ENABLED:-false}
      - TELEGRAM_DAILY_REPORT_HOUR=${TELEGRAM_DAILY_REPORT_HOUR:-8}
      - TELEGRAM_DAILY_REPORT_MINUTE=${TELEGRAM_DAILY_REPORT_MINUTE:-30}
      - TELEGRAM_TIMEZONE=${TELEGRAM_TIMEZONE:-Asia/Bangkok}
      - TELEGRAM_USE_AI_SUMMARY=${TELEGRAM_USE_AI_SUMMARY:-true}
      - TELEGRAM_PUBLIC_NEWS_LIMIT=${TELEGRAM_PUBLIC_NEWS_LIMIT:-3}
      - TELEGRAM_PUBLIC_WATCHLIST_LIMIT=${TELEGRAM_PUBLIC_WATCHLIST_LIMIT:-3}
      - TELEGRAM_PRIVATE_REPORT_MAX_ASSETS=${TELEGRAM_PRIVATE_REPORT_MAX_ASSETS:-8}
      - TELEGRAM_PRIVATE_REPORT_MAX_NEWS_ITEMS=${TELEGRAM_PRIVATE_REPORT_MAX_NEWS_ITEMS:-20}
      - MONITOR_WATCHLIST_SYMBOLS=${MONITOR_WATCHLIST_SYMBOLS:-AAPL,MSFT,NVDA,TSLA,SPY,QQQ,BTC-USD,ETH-USD}
      - MONITOR_ECONOMIC_INDICATORS=${MONITOR_ECONOMIC_INDICATORS:-FOMC,CPI,PCE,NFP,GDP,PMI,Initial Jobless Claims,Unemployment Rate,Retail Sales,Core Inflation,ECB,BoJ,OPEC}
      - MONITOR_RSS_SOURCES=${MONITOR_RSS_SOURCES:-https://feeds.finance.yahoo.com/rss/2.0/headline,https://www.investing.com/rss/news.rss,https://cointelegraph.com/rss,https://coindesk.com/arc/outboundfeeds/rss/}
      - MONITOR_IPO_WATCHLIST_PATH=/app/data/ipo_watchlist.json
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
