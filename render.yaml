# Render Blueprint for the Agent Invest backend (FastAPI + PostgreSQL/pgvector).
# Deploy: push to GitHub, then Render -> New -> Blueprint -> pick this repo.
# Secrets (sync:false) are entered in the Render dashboard, not committed here.
databases:
  - name: agent-invest-db
    plan: free                 # free Postgres (expires after 90 days; upgrade to keep data)
    postgresMajorVersion: "16" # supports the pgvector extension (created automatically on boot)

services:
  - type: web
    name: agent-invest-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # --- database (wired automatically from the managed Postgres above) ---
      - key: DATABASE_URL
        fromDatabase:
          name: agent-invest-db
          property: connectionString
      # --- LLM via OpenRouter (required) ---
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: deepseek/deepseek-v4-flash
      - key: OPENROUTER_EMBEDDING_MODEL
        value: openai/text-embedding-3-small
      # --- frontend / CORS ---
      - key: FRONTEND_URL           # your Cloudflare Workers URL
        sync: false
      - key: CORS_ALLOW_ORIGIN_REGEX
        value: https://.*\.(workers|pages)\.dev
      # --- data sources (optional but recommended) ---
      - key: FRED_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      # --- Telegram (optional; leave blank to disable) ---
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false
      - key: TELEGRAM_ADMIN_TOKEN
        sync: false
      - key: TELEGRAM_TIMEZONE
        value: Asia/Bangkok
