# Render Blueprint for Agent Invest MVP.
# Deploy: push to GitHub, then Render -> New -> Blueprint -> select this repo.
# Required secret: OPENROUTER_API_KEY on agent-invest-backend.

databases:
  - name: agent-invest-db
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: agent-invest-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agent-invest-db
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # NOTE: OpenRouter retires free models often — if AI calls start returning
      # 404, update this to a currently-available model id (see openrouter.ai/models).
      - key: OPENROUTER_MODEL
        value: openai/gpt-oss-20b:free
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: RAG_ENABLED
        value: "false"
      - key: EMBEDDING_API_KEY
        sync: false
      - key: EMBEDDING_BASE_URL
        value: https://api.jina.ai/v1
      - key: EMBEDDING_MODEL
        value: jina-embeddings-v2-base-en
      - key: EMBEDDING_DIM
        value: "768"
      - key: FRONTEND_URL
        value: https://agent-invest-frontend.onrender.com
      - key: CORS_ALLOW_ORIGINS
        value: https://agent-invest-frontend.onrender.com
      - key: CORS_ALLOW_ORIGIN_REGEX
        value: https://.*\.(workers|pages)\.dev|https://.*\.onrender\.com
      - key: NEWS_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      # ชื่อ bot (ไม่มี @) — ใช้ทำลิงก์ DM ในรายงาน + ปุ่มส่งต่อจากกลุ่ม
      - key: TELEGRAM_BOT_USERNAME
        value: Agent_invest_pbot
      - key: TELEGRAM_CHANNEL_ID
        sync: false
      # กลุ่ม community — ตั้ง chat id ของกลุ่ม (ขึ้นต้น -100 สำหรับ supergroup) แล้ว
      # เปิด TELEGRAM_COMMUNITY_REPORT_ENABLED=true เพื่อให้รายงานรายวันเข้ากลุ่มด้วย
      # (บอทต้องเป็นสมาชิก/แอดมินของกลุ่มนั้น)
      - key: TELEGRAM_COMMUNITY_CHAT_ID
        sync: false
      - key: TELEGRAM_COMMUNITY_REPORT_ENABLED
        value: "false"
      - key: TELEGRAM_ADMIN_TOKEN
        sync: false
      # กลุ่มที่ 2 — bot คนละตัว (bot2) ส่งรายงานรายวันขนานกับ bot1
      # ตั้งทั้งคู่ให้ครบถ้าต้องการส่งเข้ากลุ่มที่ 2 (บอท bot2 ต้องอยู่ในกลุ่มนั้น)
      - key: TELEGRAM_BOT2_TOKEN
        sync: false
      - key: TELEGRAM_BOT2_CHANNEL_ID
        sync: false
      # Required: webhook now fails closed without it. Auto-generated so no human
      # ever handles it; after deploy call POST /telegram/webhook/register to
      # push this secret to Telegram (register reads it from this env).
      - key: TELEGRAM_WEBHOOK_SECRET_TOKEN
        generateValue: true
      - key: TELEGRAM_TIMEZONE
        value: Asia/Bangkok
      - key: TELEGRAM_DAILY_REPORT_ENABLED
        value: "true"

  - type: web
    name: agent-invest-frontend
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- -H 0.0.0.0 -p $PORT
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20.19.0"
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: BACKEND_URL
        value: https://agent-invest-backend.onrender.com

  # Daily report trigger. The backend runs on Render free tier and spins down
  # when idle, so its in-process 08:30 scheduler never fires unless the service
  # happens to be awake. This cron job runs on Render's own schedule regardless,
  # and its POST both wakes the backend and triggers the send (which dedups, so
  # it never double-sends if the in-process cron also ran).
  #
  # `free` is not a valid plan for type: cron (confirmed via Render's Blueprint
  # spec — free is web/static only; cron/private-service/background-worker all
  # require starter+). This is why the Blueprint sync had been failing outright
  # since this cron job was first added: it never actually deployed, so every
  # render.yaml push since then silently never took effect on Render's side.
  # The 08:50 late send that originally prompted this file was the in-process
  # catch_up job firing after unrelated traffic woke the service — not this
  # cron, which didn't exist yet. `starter` is the cheapest valid tier; billing
  # is per-second of actual run time with a $1/month minimum, and each
  # invocation is a multi-second curl call, so real cost sits at that floor.
  #
  # Fires every 5 min for a half hour (08:25-08:55 Asia/Bangkok == UTC 01:25-
  # 01:55), not the whole 08:00-09:55 window originally used here — that wider
  # window was sized to guard against Render's cron *itself* being unreliable,
  # which turned out not to be the real problem (see above: it simply never
  # deployed). The only actual remaining risk once the cron job itself fires
  # correctly is the backend's own free-tier cold-start wake-up, so a ~30min
  # margin after 08:30 is enough; the built-in dedup in /telegram/monitor/run
  # makes every invocation after the first a fast no-op regardless.
  #
  # Deliberately NO curl --retry: Render guarantees only one run of a given
  # cron job at a time and queues the next scheduled run behind a still-running
  # one, so a single invocation that internally retries for minutes would
  # delay/skip the next 5-min slot — defeating the point of firing repeatedly.
  # Keep each invocation short; let frequency (not in-request retries) be the
  # resilience mechanism.
  - type: cron
    name: agent-invest-daily-trigger
    runtime: image
    image:
      url: curlimages/curl:8.11.1
    schedule: "25-55/5 1 * * *"
    plan: starter
    dockerCommand: >-
      curl -fsS --max-time 60 -X POST
      -H "X-Admin-Token: $TELEGRAM_ADMIN_TOKEN"
      https://agent-invest-backend.onrender.com/telegram/monitor/run
    envVars:
      # sync:false secrets are NOT shared across services in a Blueprint even
      # when the key name matches another service's (confirmed: envVarGroups
      # explicitly can't hold sync:false values either) — this is its own
      # independent prompt. MUST be set to the exact same value as
      # agent-invest-backend's TELEGRAM_ADMIN_TOKEN in the Render dashboard,
      # or every run 401s (seen in prod: "curl: (22) ... returned error: 401").
      - key: TELEGRAM_ADMIN_TOKEN
        sync: false
