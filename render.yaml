# Render Blueprint for Agent Invest MVP.
# Deploy: push to GitHub, then Render -> New -> Blueprint -> select this repo.
# Required secret: OPENROUTER_API_KEY on agent-invest-backend.

databases:
  - name: agent-invest-db
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: agent-invest-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agent-invest-db
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: OPENROUTER_MODEL
        value: meta-llama/llama-3.3-70b-instruct:free
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: RAG_ENABLED
        value: "false"
      - key: EMBEDDING_API_KEY
        sync: false
      - key: EMBEDDING_BASE_URL
        value: https://api.jina.ai/v1
      - key: EMBEDDING_MODEL
        value: jina-embeddings-v2-base-en
      - key: EMBEDDING_DIM
        value: "768"
      - key: FRONTEND_URL
        value: https://agent-invest-frontend.onrender.com
      - key: CORS_ALLOW_ORIGINS
        value: https://agent-invest-frontend.onrender.com
      - key: CORS_ALLOW_ORIGIN_REGEX
        value: https://.*\.(workers|pages)\.dev|https://.*\.onrender\.com
      - key: NEWS_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHANNEL_ID
        sync: false
      - key: TELEGRAM_ADMIN_TOKEN
        sync: false
      - key: TELEGRAM_TIMEZONE
        value: Asia/Bangkok
      - key: TELEGRAM_DAILY_REPORT_ENABLED
        value: "true"

  - type: web
    name: agent-invest-frontend
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- -H 0.0.0.0 -p $PORT
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20.19.0"
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: BACKEND_URL
        value: https://agent-invest-backend.onrender.com
