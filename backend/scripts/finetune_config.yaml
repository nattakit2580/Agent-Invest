# Fine-tuning config for unsloth (Phase 5)
# Install: pip install unsloth
# Run: python -m unsloth.cli.train finetune_config.yaml

base_model: unsloth/Qwen2.5-7B-Instruct
model_type: qwen2

dataset:
  train: ./training_data/train.jsonl
  val: ./training_data/val.jsonl
  format: sharegpt          # messages format: [{role, content}, ...]

output_dir: ./checkpoints/agent-invest-7b

training:
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  warmup_ratio: 0.05
  lr_scheduler_type: cosine
  max_seq_length: 2048
  fp16: true
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  load_best_model_at_end: true
  metric_for_best_model: eval_loss

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

# After training, export to GGUF for local inference with ollama:
# python -m unsloth.cli.export --model ./checkpoints/agent-invest-7b --format gguf
# ollama create agent-invest-7b -f Modelfile
